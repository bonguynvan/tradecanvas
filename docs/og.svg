<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111122"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="rgba(59,130,246,0.18)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark -->
  <g transform="translate(96, 88)">
    <rect width="96" height="96" rx="22" fill="url(#mark)"/>
    <path
      d="M20 70 L40 50 L52 58 L72 32 L84 42"
      fill="none"
      stroke="#fff"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <text
    x="96"
    y="280"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="84"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-2"
  >TradeCanvas</text>

  <text
    x="96"
    y="340"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="32"
    font-weight="500"
    fill="#a1a1aa"
  >High-performance canvas trading chart</text>

  <!-- Feature badges -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="500" fill="#e1e1e6">
    <g transform="translate(96, 420)">
      <rect width="220" height="56" rx="10" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
      <text x="20" y="36">33 indicators</text>
    </g>
    <g transform="translate(336, 420)">
      <rect width="220" height="56" rx="10" fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
      <text x="20" y="36" fill="#10b981">23 drawing tools</text>
    </g>
    <g transform="translate(576, 420)">
      <rect width="200" height="56" rx="10" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
      <text x="20" y="36">17 chart types</text>
    </g>
    <g transform="translate(796, 420)">
      <rect width="248" height="56" rx="10" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
      <text x="20" y="36" fill="#ef4444">Backtester · 0.8</text>
    </g>
  </g>

  <text
    x="96"
    y="556"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="20"
    fill="#6b6b7b"
  >npm install @tradecanvas/chart  ·  MIT  ·  bonguynvan/tradecanvas</text>
</svg>
