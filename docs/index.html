<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeCanvas -- High-Performance Canvas Trading Chart</title>
  <meta name="description" content="High-performance canvas trading chart with a built-in TradingView-like UI: 33 indicators, 23 drawing tools, 12 chart types, real-time streaming, web-worker indicator pipeline, mobile-ready, and zero dependencies." />
  <style>
    /* Reset */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --bg-elevated: #111118;
      --bg-card: rgba(17, 17, 24, 0.7);
      --bg-panel: #16161f;
      --border: #1e1e2e;
      --border-subtle: #16161f;
      --text: #e1e1e6;
      --text-muted: #6b6b7b;
      --text-dim: #a1a1aa;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.15);
      --accent-dim: rgba(59, 130, 246, 0.2);
      --green: #10b981;
      --red: #ef4444;
      --radius: 6px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
      --transition: 150ms ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Light Theme */
    body.light {
      --bg: #fafafa;
      --bg-elevated: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.8);
      --bg-panel: #f5f5f8;
      --border: #e2e2ea;
      --border-subtle: #ececf0;
      --text: #1a1a2e;
      --text-muted: #8888a0;
      --text-dim: #555566;
      --accent-glow: rgba(59, 130, 246, 0.08);
      --accent-dim: rgba(59, 130, 246, 0.1);
    }

    body.light .hero-title {
      background: linear-gradient(135deg, #1a1a2e 0%, #444460 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 64px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-title {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--text-dim);
      max-width: 540px;
      margin: 0 auto 32px;
      font-weight: 400;
    }

    /* CTA Buttons */
    .cta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .cta-install-wrap {
      display: inline-flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition);
    }

    .cta-install-wrap:hover {
      border-color: var(--accent);
    }

    .pm-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .pm-tab {
      flex: 1;
      padding: 4px 12px;
      font-size: 11px;
      font-family: var(--font);
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: none;
      cursor: pointer;
      transition: all var(--transition);
    }

    .pm-tab:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .pm-tab:hover {
      color: var(--text);
    }

    .pm-tab.active {
      color: var(--accent);
      background: rgba(59, 130, 246, 0.06);
    }

    .cta-install {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-elevated);
      border: none;
      color: var(--text);
      cursor: pointer;
      transition: background var(--transition);
    }

    .cta-install:hover {
      background: rgba(59, 130, 246, 0.06);
    }

    .cta-install .copy-icon {
      opacity: 0.4;
      transition: opacity var(--transition);
      font-size: 12px;
    }

    .cta-install:hover .copy-icon { opacity: 0.8; }

    .cta-install.copied {
      border-color: var(--green);
    }

    .cta-install.copied .copy-icon { opacity: 1; color: var(--green); }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius);
      text-decoration: none;
      transition: all var(--transition);
    }

    .cta-btn--primary {
      background: var(--accent);
      color: white;
      border: 1px solid var(--accent);
    }

    .cta-btn--primary:hover { background: #2563eb; }

    .cta-btn--ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .cta-btn--ghost:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* Badges */
    .badge-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .badge-dot--green { background: var(--green); }
    .badge-dot--red { background: var(--red); }

    /* Feature Cards */
    .features-section {
      padding: 64px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 12px;
    }

    .section-subtitle {
      text-align: center;
      color: var(--text-dim);
      font-size: 15px;
      margin-bottom: 48px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .feature-card {
      padding: 28px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color var(--transition), transform 200ms ease;
    }

    .feature-card:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }

    .feature-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent-glow);
      border: 1px solid rgba(59, 130, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 16px;
      color: var(--accent);
      font-weight: 700;
    }

    .feature-icon--green {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.2);
      color: var(--green);
    }

    .feature-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feature-card p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* Quick Start */
    .quickstart-section {
      padding: 64px 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color var(--transition);
    }

    .footer a:hover { color: var(--accent); }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .footer-sep { color: var(--border); }

    /* Widget announcement */
    .widget-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .widget-callout {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 20px;
      background: var(--bg-elevated);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      margin-bottom: 8px;
    }

    .widget-callout h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }

    .widget-callout p {
      font-size: 13px;
      color: var(--text-dim);
      margin: 0;
    }

    .widget-callout code {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
      padding: 4px 8px;
      border-radius: 4px;
      align-self: flex-start;
    }

    .widget-callout a {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      align-self: flex-start;
    }

    .widget-callout a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero { padding: 40px 16px 24px; }
      .feature-grid { grid-template-columns: 1fr; }
      .badge-row { gap: 16px; }
    }
  </style>
  <script type="module" crossorigin src="/tradecanvas/assets/index-CVxRDukN.js"></script>
  <link rel="stylesheet" crossorigin href="/tradecanvas/assets/index-Czq3lOZE.css">
</head>
<body>
  <div id="app"></div>
</body>
</html>
