<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeCanvas Embed</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #chart { width: 100%; height: 100%; }
    .tc-badge {
      position: fixed;
      bottom: 4px;
      right: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      pointer-events: auto;
    }
    .tc-badge a {
      color: inherit;
      text-decoration: none;
    }
    .tc-badge a:hover {
      color: rgba(255,255,255,0.5);
    }
  </style>
  <script type="module" crossorigin src="/tradecanvas/assets/embed-DBfzBZFd.js"></script>
  <link rel="modulepreload" crossorigin href="/tradecanvas/assets/ChartWidget-E6guMr5U.js">
</head>
<body>
  <div id="chart"></div>
  <div class="tc-badge"><a href="https://github.com/bonguynvan/tradecanvas" target="_blank" rel="noopener">Powered by TradeCanvas</a></div>
</body>
</html>
