name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build commons (workspace dep)
        run: pnpm --filter @tradecanvas/commons build

      - name: Run tests
        run: pnpm test
