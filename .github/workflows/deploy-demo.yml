name: Deploy Demo
on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'packages/**'
      - 'CHANGELOG.md'
      - 'README.md'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build packages + demo
        run: pnpm -r --filter @tradecanvas/commons --filter @tradecanvas/core --filter @tradecanvas/analytics --filter @tradecanvas/chart --filter @tradecanvas/demo build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/build

      - id: deployment
        uses: actions/deploy-pages@v4
